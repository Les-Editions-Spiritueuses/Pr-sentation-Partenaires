<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Les Éditions Spiritueuses — Présentation 2026</title>
  <style>
    :root{
      --bg:#06111f;
      --panel:rgba(8,18,32,.50);
      --panel-border:rgba(212,171,94,.20);
      --gold:#d4ab5e;
      --gold-soft:rgba(212,171,94,.38);
      --text:#f4efe3;
      --top-safe:max(env(safe-area-inset-top), 12px);
      --bottom-safe:max(env(safe-area-inset-bottom), 12px);
      --app-height:100vh;
      --progress:0%;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;width:100%;height:100%;overflow:hidden;background:#000;
      touch-action:manipulation;overscroll-behavior:none;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text)}
    #app{
      position:fixed;inset:0;width:100%;height:var(--app-height);overflow:hidden;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,.03), transparent 35%),
        linear-gradient(180deg, #02060d 0%, #071426 60%, #02060d 100%);
    }
    #viewer{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      padding:calc(var(--top-safe) + 52px) clamp(10px, 1.6vw, 20px) calc(var(--bottom-safe) + 14px) clamp(10px, 1.6vw, 20px);
    }
    #stage{
      position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      perspective:1600px;overflow:hidden;
    }
    #slide-wrap{
      position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;
    }
    #slide{
      display:block;max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;
      border-radius:10px;
      box-shadow:0 30px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.03);
      transform-origin:center center;will-change:transform, opacity, filter;
      user-select:none;-webkit-user-drag:none;touch-action:none;background:#091322;
      transition:transform .18s linear;
    }
    .cinema-out{animation:cinemaOut .34s cubic-bezier(.4,0,.2,1) forwards}
    .cinema-in{animation:cinemaIn .42s cubic-bezier(.18,.78,.22,1) forwards}
    @keyframes cinemaOut{
      0%{opacity:1;transform:translateX(0) scale(1) rotateY(0deg);filter:blur(0)}
      100%{opacity:.08;transform:translateX(-32px) scale(.975) rotateY(9deg);filter:blur(10px)}
    }
    @keyframes cinemaIn{
      0%{opacity:.08;transform:translateX(32px) scale(1.025) rotateY(-9deg);filter:blur(10px)}
      100%{opacity:1;transform:translateX(0) scale(1) rotateY(0deg);filter:blur(0)}
    }
    .hud{
      position:absolute;left:0;right:0;top:0;z-index:20;pointer-events:none;
      padding:calc(var(--top-safe) + 8px) clamp(12px, 1.8vw, 22px) 0;
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
    .brand,.counter{
      pointer-events:auto;background:var(--panel);border:1px solid var(--panel-border);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:999px;
      padding:9px 14px;line-height:1;box-shadow:0 8px 24px rgba(0,0,0,.22);
    }
    .brand{
      font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:rgba(244,239,227,.85);
      white-space:nowrap;max-width:70vw;overflow:hidden;text-overflow:ellipsis;
    }
    .counter{font-size:12px;letter-spacing:.14em;color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums}
    #progress-track{
      position:relative;width:min(420px, calc(100vw - 36px));max-width:100%;height:4px;margin:0 auto;
      border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;box-shadow:0 1px 0 rgba(255,255,255,.06) inset;
    }
    #progress-bar{
      position:absolute;inset:0 auto 0 0;width:var(--progress);border-radius:999px;
      background:linear-gradient(90deg, rgba(212,171,94,.55) 0%, rgba(212,171,94,1) 65%, rgba(245,226,183,1) 100%);
      box-shadow:0 0 18px rgba(212,171,94,.35);transition:width .28s ease;
    }
    .nav{
      position:absolute;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;
      border:1px solid var(--gold-soft);background:rgba(4,12,22,.32);color:var(--gold);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;
      font-size:22px;cursor:pointer;z-index:15;user-select:none;
      transition:transform .15s ease, background .2s ease, opacity .2s ease, border-color .2s ease;
      box-shadow:0 10px 30px rgba(0,0,0,.22);
    }
    .nav:hover{transform:translateY(-50%) scale(1.04);background:rgba(212,171,94,.10);border-color:rgba(212,171,94,.65)}
    .nav:active{transform:translateY(-50%) scale(.98)}
    .nav:disabled{opacity:.25;cursor:default}
    #prev{left:clamp(10px, 1.5vw, 20px)}
    #next{right:clamp(10px, 1.5vw, 20px)}
    #hint{
      position:absolute;right:clamp(12px, 1.8vw, 22px);bottom:calc(var(--bottom-safe) + 8px);z-index:18;
      background:rgba(5,14,24,.36);border:1px solid rgba(212,171,94,.12);color:rgba(244,239,227,.58);
      font-size:11px;line-height:1;letter-spacing:.08em;border-radius:999px;padding:10px 12px;
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);pointer-events:none;
    }
    #fullscreen-tip,#zoom-badge{
      position:absolute;left:50%;bottom:calc(var(--bottom-safe) + 8px);transform:translateX(-50%);z-index:19;
      border-radius:999px;padding:10px 14px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      max-width:calc(100vw - 24px);text-align:center;pointer-events:none;
    }
    #fullscreen-tip{
      background:rgba(5,14,24,.6);border:1px solid rgba(212,171,94,.2);color:rgba(244,239,227,.82);
      font-size:12px;line-height:1.25;transition:opacity .25s ease, transform .25s ease;
    }
    #fullscreen-tip.hidden{opacity:0;transform:translateX(-50%) translateY(12px)}
    #zoom-badge{
      background:rgba(5,14,24,.62);border:1px solid rgba(212,171,94,.24);color:var(--gold);
      font-size:12px;font-weight:700;letter-spacing:.1em;opacity:0;transition:opacity .2s ease;
    }
    #zoom-badge.show{opacity:1}
    @media (max-width:900px){
      .brand{font-size:11px;letter-spacing:.14em}.counter{font-size:11px}.nav{width:46px;height:46px;font-size:18px}#hint{display:none}
    }
    @media (max-width:640px){
      #viewer{padding:calc(var(--top-safe) + 44px) 8px calc(var(--bottom-safe) + 8px) 8px}
      #slide{border-radius:8px}.nav{width:42px;height:42px;font-size:17px}.brand{max-width:62vw}
      #progress-track{width:min(360px, calc(100vw - 24px));height:3px}
    }
    @media (orientation:landscape) and (max-width:1024px){
      #viewer{padding:calc(var(--top-safe) + 36px) 8px calc(var(--bottom-safe) + 6px) 8px}
      .topbar{margin-bottom:8px}.brand,.counter{padding:7px 11px}#progress-track{height:3px}#hint{display:none}
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hud">
      <div class="topbar">
        <div class="brand">Les Éditions Spiritueuses</div>
        <div class="counter" id="counter">1 / 11</div>
      </div>
      <div id="progress-track"><div id="progress-bar"></div></div>
    </div>

    <div id="viewer">
      <button id="prev" class="nav" aria-label="Slide précédente">←</button>
      <div id="stage"><div id="slide-wrap"><img id="slide" src="" alt="Slide de présentation" /></div></div>
      <button id="next" class="nav" aria-label="Slide suivante">→</button>
    </div>

    <div id="hint">← → · swipe · pincer pour zoomer</div>
    <div id="fullscreen-tip">Touchez l’écran pour un affichage plus immersif</div>
    <div id="zoom-badge">100%</div>
  </div>

  <script>
    const TOTAL = 11;
    const VERSION = "20260312c";
    const slides = Array.from({ length: TOTAL }, (_, i) => `slides/slide${i + 1}.jpg?v=${VERSION}`);

    const app = document.getElementById('app');
    const slide = document.getElementById('slide');
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const tip = document.getElementById('fullscreen-tip');
    const zoomBadge = document.getElementById('zoom-badge');

    let current = 0, scale = 1, panX = 0, panY = 0, lastTap = 0, animationLock = false;
    let pointerDown = false, startX = 0, startY = 0, startPanX = 0, startPanY = 0;
    let swipeStartX = 0, swipeStartY = 0, swipeTracking = false;
    let pinchStartDistance = null, pinchStartScale = 1, zoomBadgeTimer = null, fullscreenAsked = false;

    function setAppHeight(){
      document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
      window.scrollTo(0,1);
    }

    function updateUI(){
      const percent = ((current + 1) / TOTAL) * 100;
      document.documentElement.style.setProperty('--progress', `${percent}%`);
      counter.textContent = `${current + 1} / ${TOTAL}`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === TOTAL - 1;
    }

    function preloadAround(index){
      [index - 1, index + 1].forEach(i => {
        if (i >= 0 && i < TOTAL) {
          const img = new Image();
          img.src = slides[i];
        }
      });
    }

    function clampPan(){
      const rect = slide.getBoundingClientRect();
      const viewportW = app.clientWidth;
      const viewportH = app.clientHeight;
      const overflowX = Math.max(0, (rect.width - viewportW) / 2);
      const overflowY = Math.max(0, (rect.height - viewportH) / 2);
      panX = Math.max(-overflowX, Math.min(overflowX, panX));
      panY = Math.max(-overflowY, Math.min(overflowY, panY));
    }

    function applyTransform(animate=false){
      if (scale <= 1.001) {
        scale = 1; panX = 0; panY = 0;
      } else {
        clampPan();
      }
      slide.style.transition = animate ? 'transform .18s ease' : 'transform .05s linear';
      slide.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${scale})`;
    }

    function showZoomBadge(){
      zoomBadge.textContent = `${Math.round(scale * 100)}%`;
      zoomBadge.classList.add('show');
      clearTimeout(zoomBadgeTimer);
      zoomBadgeTimer = setTimeout(() => zoomBadge.classList.remove('show'), 700);
    }

    function resetZoom(animated=false){
      scale = 1; panX = 0; panY = 0;
      applyTransform(animated);
      showZoomBadge();
    }

    function setSlide(index){
      if (index < 0 || index >= TOTAL || animationLock) return;
      animationLock = true;
      slide.classList.remove('cinema-in', 'cinema-out');
      slide.style.transition = 'none';
      slide.classList.add('cinema-out');

      const nextSrc = slides[index];
      const probe = new Image();
      probe.onload = () => {
        setTimeout(() => {
          current = index;
          slide.src = nextSrc;
          resetZoom(false);
          updateUI();
          preloadAround(current);
          slide.classList.remove('cinema-out');
          void slide.offsetWidth;
          slide.classList.add('cinema-in');
          setTimeout(() => {
            slide.classList.remove('cinema-in');
            animationLock = false;
          }, 430);
        }, 120);
      };
      probe.onerror = () => {
        animationLock = false;
        alert(`Image introuvable : ${nextSrc}`);
      };
      probe.src = nextSrc;
    }

    function nextSlide(){ if (current < TOTAL - 1) setSlide(current + 1); }
    function prevSlide(){ if (current > 0) setSlide(current - 1); }
    function distance(t1, t2){ return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY); }

    async function requestImmersiveMode(){
      if (fullscreenAsked) return;
      fullscreenAsked = true;
      tip.classList.add('hidden');
      const el = document.documentElement;
      try {
        if (el.requestFullscreen) {
          await el.requestFullscreen({ navigationUI: 'hide' });
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
        }
      } catch (e) {}
      setTimeout(setAppHeight, 80);
    }

    prevBtn.addEventListener('click', () => { requestImmersiveMode(); prevSlide(); });
    nextBtn.addEventListener('click', () => { requestImmersiveMode(); nextSlide(); });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
      if (e.key === '+' || e.key === '=') { scale = Math.min(4, scale + 0.25); applyTransform(true); showZoomBadge(); }
      if (e.key === '-') { scale = Math.max(1, scale - 0.25); applyTransform(true); showZoomBadge(); }
      if (e.key === '0') resetZoom(true);
    });

    slide.addEventListener('dblclick', () => {
      requestImmersiveMode();
      if (scale > 1.01) resetZoom(true);
      else { scale = 2; panX = 0; panY = 0; applyTransform(true); showZoomBadge(); }
    });

    slide.addEventListener('pointerdown', (e) => {
      requestImmersiveMode();
      pointerDown = true;
      startX = e.clientX; startY = e.clientY; startPanX = panX; startPanY = panY;
      if (scale <= 1.01) { swipeTracking = true; swipeStartX = e.clientX; swipeStartY = e.clientY; }
      try { slide.setPointerCapture(e.pointerId); } catch (_) {}
    });

    slide.addEventListener('pointermove', (e) => {
      if (!pointerDown || scale <= 1.01) return;
      panX = startPanX + (e.clientX - startX);
      panY = startPanY + (e.clientY - startY);
      applyTransform(false);
    });

    function endPointer(e){
      if (!pointerDown && !swipeTracking) return;
      if (pointerDown && scale <= 1.01 && swipeTracking) {
        const dx = e.clientX - swipeStartX;
        const dy = e.clientY - swipeStartY;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.2) dx < 0 ? nextSlide() : prevSlide();
      }
      pointerDown = false; swipeTracking = false;
      try { slide.releasePointerCapture(e.pointerId); } catch (_) {}
    }
    slide.addEventListener('pointerup', endPointer);
    slide.addEventListener('pointercancel', endPointer);

    slide.addEventListener('touchstart', (e) => {
      requestImmersiveMode();
      if (e.touches.length === 2) {
        pinchStartDistance = distance(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
      } else if (e.touches.length === 1) {
        const now = Date.now();
        if (now - lastTap < 280) {
          if (scale > 1.01) resetZoom(true);
          else { scale = 2; panX = 0; panY = 0; applyTransform(true); showZoomBadge(); }
          e.preventDefault();
        }
        lastTap = now;
        swipeStartX = e.touches[0].clientX;
        swipeStartY = e.touches[0].clientY;
        if (scale > 1.01) {
          startX = e.touches[0].clientX; startY = e.touches[0].clientY;
          startPanX = panX; startPanY = panY;
        }
      }
    }, { passive:false });

    slide.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && pinchStartDistance) {
        const newDist = distance(e.touches[0], e.touches[1]);
        scale = Math.min(4, Math.max(1, pinchStartScale * (newDist / pinchStartDistance)));
        applyTransform(false);
        showZoomBadge();
        e.preventDefault();
        return;
      }
      if (e.touches.length === 1 && scale > 1.01) {
        panX = startPanX + (e.touches[0].clientX - startX);
        panY = startPanY + (e.touches[0].clientY - startY);
        applyTransform(false);
        e.preventDefault();
      }
    }, { passive:false });

    slide.addEventListener('touchend', (e) => {
      if (pinchStartDistance) { pinchStartDistance = null; pinchStartScale = scale; return; }
      if (scale <= 1.01) {
        const touch = e.changedTouches[0];
        if (!touch) return;
        const dx = touch.clientX - swipeStartX;
        const dy = touch.clientY - swipeStartY;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.2) dx < 0 ? nextSlide() : prevSlide();
      }
    });

    window.addEventListener('resize', () => { setAppHeight(); applyTransform(false); });
    window.addEventListener('orientationchange', () => {
      setTimeout(setAppHeight, 50);
      setTimeout(setAppHeight, 350);
      applyTransform(false);
    });
    document.addEventListener('fullscreenchange', setAppHeight);

    window.addEventListener('load', () => {
      setAppHeight();
      setTimeout(() => tip.classList.add('hidden'), 1800);
      slide.src = slides[0];
      updateUI();
      preloadAround(0);
      applyTransform(false);
    });

    document.body.addEventListener('click', () => requestImmersiveMode(), { once:true });
  </script>
</body>
</html>
