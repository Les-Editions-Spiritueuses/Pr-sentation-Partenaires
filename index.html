<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Les Éditions Spiritueuses — Présentation 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Georgia, serif;
      padding: 16px;
      color: #e8dfcf;
    }
    #viewer {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    #slide-container {
      width: 100%;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      position: relative;
      background: #1a2035;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #slide-img {
      width: 100%;
      display: block;
      transition: opacity 0.25s ease;
    }
    #slide-img.fade { opacity: 0; }
    #loading,
    #error-box {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: rgba(13,17,23,0.72);
      z-index: 3;
    }
    #loading.show,
    #error-box.show { display: flex; }
    #loading-text,
    #error-text {
      max-width: 720px;
      color: #c5a05a;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      letter-spacing: 0.5px;
      white-space: pre-wrap;
    }
    #zoom-btn {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(13,17,23,0.7);
      border: 1.5px solid rgba(197,160,90,0.5);
      color: #c5a05a;
      width: 36px; height: 36px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
      z-index: 4;
    }
    #zoom-btn:hover { background: rgba(197,160,90,0.2); border-color: #c5a05a; }
    #controls { display: flex; align-items: center; gap: 18px; }
    .btn {
      background: transparent;
      border: 1.5px solid rgba(197,160,90,0.5);
      color: #c5a05a;
      width: 42px; height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) { background: rgba(197,160,90,0.15); border-color: #c5a05a; }
    .btn:disabled { opacity: 0.2; cursor: default; }
    #counter { color: #c5a05a; font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 2px; min-width: 70px; text-align: center; }
    #dots { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(197,160,90,0.2); cursor: pointer; transition: all 0.2s; }
    .dot.active { background: #c5a05a; transform: scale(1.3); }
    .dot:hover { background: rgba(197,160,90,0.55); }
    #hint { color: rgba(197,160,90,0.42); font-size: 11px; letter-spacing: 1px; font-family: monospace; text-align: center; }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox-inner {
      position: relative;
      max-width: 95vw;
      max-height: 95vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lightbox-img {
      max-width: 88vw;
      max-height: 88vh;
      border-radius: 6px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
      object-fit: contain;
      transform-origin: center center;
      transition: transform 0.15s ease, opacity 0.2s ease;
      cursor: grab;
      user-select: none;
    }
    #lightbox-img.grabbing { cursor: grabbing; }
    #lightbox-close {
      position: fixed;
      top: 18px; right: 22px;
      background: rgba(13,17,23,0.8);
      border: 1.5px solid rgba(197,160,90,0.4);
      color: #c5a05a;
      width: 38px; height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      z-index: 102;
    }
    #lightbox-close:hover { background: rgba(197,160,90,0.2); border-color: #c5a05a; }
    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(13,17,23,0.75);
      border: 1.5px solid rgba(197,160,90,0.4);
      color: #c5a05a;
      width: 46px; height: 46px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      z-index: 102;
      backdrop-filter: blur(4px);
    }
    .lb-nav:hover:not(:disabled) { background: rgba(197,160,90,0.2); border-color: #c5a05a; }
    .lb-nav:disabled { opacity: 0.15; cursor: default; }
    #lb-prev { left: 18px; }
    #lb-next { right: 18px; }
    #lightbox-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 102;
      background: rgba(13,17,23,0.7);
      border: 1.5px solid rgba(197,160,90,0.2);
      border-radius: 30px;
      padding: 6px 14px;
      backdrop-filter: blur(6px);
    }
    .lbtn {
      background: transparent;
      border: none;
      color: #c5a05a;
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .lbtn:hover { background: rgba(197,160,90,0.15); }
    #zoom-level { color: #c5a05a; font-family: 'Courier New', monospace; font-size: 12px; min-width: 46px; text-align: center; letter-spacing: 1px; }
    .bar-sep { width: 1px; height: 20px; background: rgba(197,160,90,0.25); margin: 0 4px; }
    #lb-counter { color: rgba(197,160,90,0.7); font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 1px; min-width: 52px; text-align: center; }

    @media (max-width: 640px) {
      body { padding: 10px; }
      #viewer { gap: 12px; }
      #controls { gap: 12px; }
      .btn { width: 40px; height: 40px; }
      #hint { font-size: 10px; }
      #lightbox-bar { bottom: 14px; padding: 6px 10px; }
      #lb-prev { left: 10px; }
      #lb-next { right: 10px; }
    }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="slide-container">
      <img id="slide-img" src="" alt="Slide">
      <div id="loading"><div id="loading-text">Chargement…</div></div>
      <div id="error-box"><div id="error-text"></div></div>
      <button id="zoom-btn" title="Zoom">&#x26F6;</button>
    </div>
    <div id="controls">
      <button class="btn" id="prev">&#8592;</button>
      <div id="dots"></div>
      <button class="btn" id="next">&#8594;</button>
    </div>
    <div id="counter">1 / 11</div>
    <div id="hint">← → pour naviguer · balayage tactile activé · ⛶ pour zoomer</div>
  </div>

  <div id="lightbox">
    <div id="lightbox-inner">
      <img id="lightbox-img" src="" alt="Slide zoomée">
    </div>
    <button id="lightbox-close">&#x2715;</button>
    <button class="lb-nav" id="lb-prev">&#8592;</button>
    <button class="lb-nav" id="lb-next">&#8594;</button>
    <div id="lightbox-bar">
      <button class="lbtn" id="lb-zoom-out" title="Dézoomer">&#x2212;</button>
      <span id="zoom-level">100%</span>
      <button class="lbtn" id="lb-zoom-in" title="Zoomer">&#x2B;</button>
      <button class="lbtn" id="lb-reset" title="Réinitialiser">&#x21BA;</button>
      <div class="bar-sep"></div>
      <span id="lb-counter">1 / 11</span>
    </div>
  </div>

  <script>
    const N = 11;
    const VERSION = '20260312b';
    const slideCache = new Map();

    function candidatesFor(index) {
      const n = index + 1;
      return [
        `slides/slide${n}.jpg?v=${VERSION}`,
        `slides/slide${n}.JPG?v=${VERSION}`,
        `slide${n}.jpg?v=${VERSION}`,
        `slide${n}.JPG?v=${VERSION}`
      ];
    }

    function probe(url) {
      return new Promise((resolve, reject) => {
        const test = new Image();
        test.onload = () => resolve(url);
        test.onerror = () => reject(url);
        test.src = url;
      });
    }

    async function resolveSlide(index) {
      if (slideCache.has(index)) return slideCache.get(index);
      const candidates = candidatesFor(index);
      for (const url of candidates) {
        try {
          await probe(url);
          slideCache.set(index, url);
          return url;
        } catch (_) {}
      }
      throw new Error(candidates.join('\n'));
    }

    let current = 0;
    let lastGoodSrc = '';
    const img = document.getElementById('slide-img');
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const dotsEl = document.getElementById('dots');
    const zoomBtn = document.getElementById('zoom-btn');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbClose = document.getElementById('lightbox-close');
    const lbPrev = document.getElementById('lb-prev');
    const lbNext = document.getElementById('lb-next');
    const lbZoomIn = document.getElementById('lb-zoom-in');
    const lbZoomOut = document.getElementById('lb-zoom-out');
    const lbReset = document.getElementById('lb-reset');
    const zoomLevelEl = document.getElementById('zoom-level');
    const lbCounter = document.getElementById('lb-counter');
    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('error-box');
    const errorText = document.getElementById('error-text');

    slidesInit();

    function slidesInit() {
      for (let i = 0; i < N; i++) {
        const d = document.createElement('div');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        d.addEventListener('click', () => goTo(i));
        dotsEl.appendChild(d);
      }
    }

    function setLoading(state, text = 'Chargement…') {
      loading.classList.toggle('show', state);
      document.getElementById('loading-text').textContent = text;
    }

    function showError(message) {
      errorText.textContent = message;
      errorBox.classList.add('show');
    }

    function hideError() {
      errorBox.classList.remove('show');
      errorText.textContent = '';
    }

    async function preload(index) {
      if (index < 0 || index >= N || slideCache.has(index)) return;
      try { await resolveSlide(index); } catch (_) {}
    }

    function updateUI() {
      counter.textContent = `${current + 1} / ${N}`;
      lbCounter.textContent = `${current + 1} / ${N}`;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === N - 1;
      lbPrev.disabled = current === 0;
      lbNext.disabled = current === N - 1;
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    }

    async function goTo(n) {
      if (n < 0 || n >= N) return;
      const isLbOpen = lightbox.classList.contains('open');
      current = n;
      updateUI();
      hideError();
      setLoading(true, `Chargement de la slide ${n + 1}…`);
      img.classList.add('fade');
      if (isLbOpen) lbImg.style.opacity = 0;

      try {
        const src = await resolveSlide(current);
        lastGoodSrc = src;
        img.src = src;
        if (isLbOpen) {
          resetZoom();
          lbImg.src = src;
          lbImg.style.opacity = 1;
        }
        preload(current + 1);
        preload(current - 1);
      } catch (err) {
        if (lastGoodSrc) img.src = lastGoodSrc;
        showError(
          `Impossible de charger la slide ${current + 1}.\n\n` +
          `Vérifie sur GitHub la présence exacte de l'un de ces fichiers :\n\n${err.message}`
        );
      } finally {
        setLoading(false);
        img.classList.remove('fade');
      }
    }

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));
    lbPrev.addEventListener('click', e => { e.stopPropagation(); goTo(current - 1); });
    lbNext.addEventListener('click', e => { e.stopPropagation(); goTo(current + 1); });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') goTo(current + 1);
      if (e.key === 'ArrowLeft') goTo(current - 1);
      if (lightbox.classList.contains('open')) {
        if (e.key === '+' || e.key === '=') zoomIn();
        if (e.key === '-') zoomOut();
      }
    });

    let scale = 1, panX = 0, panY = 0;
    let dragging = false, startX = 0, startY = 0, startPanX = 0, startPanY = 0;

    function openLightbox() {
      if (!img.src) return;
      lbImg.src = img.src;
      resetZoom();
      lightbox.classList.add('open');
      updateUI();
    }
    function closeLightbox() { lightbox.classList.remove('open'); }
    function applyTransform() {
      lbImg.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      zoomLevelEl.textContent = Math.round(scale * 100) + '%';
    }
    function resetZoom() { scale = 1; panX = 0; panY = 0; applyTransform(); }
    function zoomIn() { scale = Math.min(scale * 1.25, 5); applyTransform(); }
    function zoomOut() { scale = Math.max(scale / 1.25, 0.5); if (scale <= 1) { panX = 0; panY = 0; } applyTransform(); }

    zoomBtn.addEventListener('click', openLightbox);
    img.addEventListener('dblclick', openLightbox);
    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    lbZoomIn.addEventListener('click', e => { e.stopPropagation(); zoomIn(); });
    lbZoomOut.addEventListener('click', e => { e.stopPropagation(); zoomOut(); });
    lbReset.addEventListener('click', e => { e.stopPropagation(); resetZoom(); });

    lbImg.addEventListener('wheel', e => {
      e.preventDefault();
      if (e.deltaY < 0) zoomIn(); else zoomOut();
    }, { passive: false });

    lbImg.addEventListener('mousedown', e => {
      if (scale <= 1) return;
      dragging = true;
      startX = e.clientX; startY = e.clientY;
      startPanX = panX; startPanY = panY;
      lbImg.classList.add('grabbing');
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      panX = startPanX + (e.clientX - startX);
      panY = startPanY + (e.clientY - startY);
      applyTransform();
    });
    document.addEventListener('mouseup', () => { dragging = false; lbImg.classList.remove('grabbing'); });

    let lastTouchDist = null;
    lbImg.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        lastTouchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      } else if (e.touches.length === 1 && scale > 1) {
        dragging = true;
        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        startPanX = panX; startPanY = panY;
      }
    }, { passive: true });
    lbImg.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && lastTouchDist) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        scale = Math.min(Math.max(scale * (dist / lastTouchDist), 0.5), 5);
        lastTouchDist = dist;
        applyTransform();
      } else if (e.touches.length === 1 && dragging) {
        panX = startPanX + (e.touches[0].clientX - startX);
        panY = startPanY + (e.touches[0].clientY - startY);
        applyTransform();
      }
    }, { passive: true });
    lbImg.addEventListener('touchend', () => { lastTouchDist = null; dragging = false; });

    let touchStartX = 0;
    let touchStartY = 0;
    let touchMoved = false;
    const slideContainer = document.getElementById('slide-container');

    slideContainer.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchMoved = false;
    }, { passive: true });

    slideContainer.addEventListener('touchmove', e => {
      if (e.touches.length !== 1) return;
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      if (Math.abs(dx) > 12 || Math.abs(dy) > 12) touchMoved = true;
    }, { passive: true });

    slideContainer.addEventListener('touchend', e => {
      if (!touchMoved || !e.changedTouches.length) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.2) {
        if (dx < 0) goTo(current + 1);
        else goTo(current - 1);
      }
    }, { passive: true });

    goTo(0);
    preload(1);
  </script>
</body>
</html>
