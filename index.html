<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Éditions Spiritueuses — Présentation 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Georgia, serif;
      padding: 16px;
    }
    #viewer { width: 100%; max-width: 1100px; display: flex; flex-direction: column; align-items: center; gap: 14px; }

    #slide-container {
      width: 100%;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      position: relative;
      background: #1a2035;
    }
    #slide-img {
      width: 100%;
      display: block;
      transition: opacity 0.25s ease;
    }
    #slide-img.fade { opacity: 0; }

    #zoom-btn {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(13,17,23,0.7);
      border: 1.5px solid rgba(197,160,90,0.5);
      color: #c5a05a;
      width: 36px; height: 36px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }
    #zoom-btn:hover { background: rgba(197,160,90,0.2); border-color: #c5a05a; }

    #controls { display: flex; align-items: center; gap: 18px; }
    .btn {
      background: transparent;
      border: 1.5px solid rgba(197,160,90,0.5);
      color: #c5a05a;
      width: 42px; height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) { background: rgba(197,160,90,0.15); border-color: #c5a05a; }
    .btn:disabled { opacity: 0.2; cursor: default; }
    #counter { color: #c5a05a; font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 2px; min-width: 70px; text-align: center; }
    #dots { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(197,160,90,0.2); cursor: pointer; transition: all 0.2s; }
    .dot.active { background: #c5a05a; transform: scale(1.3); }
    .dot:hover { background: rgba(197,160,90,0.55); }
    #hint { color: rgba(197,160,90,0.3); font-size: 11px; letter-spacing: 1px; font-family: monospace; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox-inner {
      position: relative;
      max-width: 95vw;
      max-height: 95vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lightbox-img {
      max-width: 88vw;
      max-height: 88vh;
      border-radius: 6px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
      object-fit: contain;
      transform-origin: center center;
      transition: transform 0.15s ease, opacity 0.2s ease;
      cursor: grab;
      user-select: none;
    }
    #lightbox-img.grabbing { cursor: grabbing; }

    #lightbox-close {
      position: fixed;
      top: 18px; right: 22px;
      background: rgba(13,17,23,0.8);
      border: 1.5px solid rgba(197,160,90,0.4);
      color: #c5a05a;
      width: 38px; height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      z-index: 102;
    }
    #lightbox-close:hover { background: rgba(197,160,90,0.2); border-color: #c5a05a; }

    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(13,17,23,0.75);
      border: 1.5px solid rgba(197,160,90,0.4);
      color: #c5a05a;
      width: 46px; height: 46px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      z-index: 102;
      backdrop-filter: blur(4px);
    }
    .lb-nav:hover:not(:disabled) { background: rgba(197,160,90,0.2); border-color: #c5a05a; }
    .lb-nav:disabled { opacity: 0.15; cursor: default; }
    #lb-prev { left: 18px; }
    #lb-next { right: 18px; }

    #lightbox-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 102;
      background: rgba(13,17,23,0.7);
      border: 1.5px solid rgba(197,160,90,0.2);
      border-radius: 30px;
      padding: 6px 14px;
      backdrop-filter: blur(6px);
    }
    .lbtn {
      background: transparent;
      border: none;
      color: #c5a05a;
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .lbtn:hover { background: rgba(197,160,90,0.15); }
    #zoom-level { color: #c5a05a; font-family: 'Courier New', monospace; font-size: 12px; min-width: 46px; text-align: center; letter-spacing: 1px; }
    .bar-sep { width: 1px; height: 20px; background: rgba(197,160,90,0.25); margin: 0 4px; }
    #lb-counter { color: rgba(197,160,90,0.7); font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 1px; min-width: 52px; text-align: center; }
  </style>
</head>
<body>
  <div id="viewer">
    <div id="slide-container">
      <img id="slide-img" src="" alt="Slide">
      <button id="zoom-btn" title="Zoom">&#x26F6;</button>
    </div>
    <div id="controls">
      <button class="btn" id="prev">&#8592;</button>
      <div id="dots"></div>
      <button class="btn" id="next">&#8594;</button>
    </div>
    <div id="counter">1 / 11</div>
    <div id="hint">← → pour naviguer &nbsp;·&nbsp; ⛶ pour zoomer</div>
  </div>

  <div id="lightbox">
    <div id="lightbox-inner">
      <img id="lightbox-img" src="" alt="Slide zoomée">
    </div>
    <button id="lightbox-close">&#x2715;</button>
    <button class="lb-nav" id="lb-prev">&#8592;</button>
    <button class="lb-nav" id="lb-next">&#8594;</button>
    <div id="lightbox-bar">
      <button class="lbtn" id="lb-zoom-out" title="Dézoomer">&#x2212;</button>
      <span id="zoom-level">100%</span>
      <button class="lbtn" id="lb-zoom-in" title="Zoomer">&#x2B;</button>
      <button class="lbtn" id="lb-reset" title="Réinitialiser">&#x21BA;</button>
      <div class="bar-sep"></div>
      <span id="lb-counter">1 / 11</span>
    </div>
  </div>

  <script>
    const N = 11;
    const slides = Array.from({length: N}, (_, i) => `slides/slide${i+1}.jpg`);

    let current = 0;
    const img = document.getElementById('slide-img');
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const dotsEl = document.getElementById('dots');
    const zoomBtn = document.getElementById('zoom-btn');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbClose = document.getElementById('lightbox-close');
    const lbPrev = document.getElementById('lb-prev');
    const lbNext = document.getElementById('lb-next');
    const lbZoomIn = document.getElementById('lb-zoom-in');
    const lbZoomOut = document.getElementById('lb-zoom-out');
    const lbReset = document.getElementById('lb-reset');
    const zoomLevelEl = document.getElementById('zoom-level');
    const lbCounter = document.getElementById('lb-counter');

    // Dots
    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });

    // Preload next/prev
    function preload(n) {
      if (n >= 0 && n < N) { const p = new Image(); p.src = slides[n]; }
    }

    function updateUI() {
      counter.textContent = (current + 1) + ' / ' + N;
      lbCounter.textContent = (current + 1) + ' / ' + N;
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === N - 1;
      lbPrev.disabled = current === 0;
      lbNext.disabled = current === N - 1;
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    }

    function goTo(n) {
      if (n < 0 || n >= N) return;
      const isLbOpen = lightbox.classList.contains('open');
      img.classList.add('fade');
      if (isLbOpen) lbImg.style.opacity = 0;
      setTimeout(() => {
        current = n;
        img.src = slides[current];
        img.classList.remove('fade');
        if (isLbOpen) {
          resetZoom();
          lbImg.src = slides[current];
          lbImg.style.opacity = 1;
        }
        updateUI();
        preload(current + 1);
        preload(current - 1);
      }, 150);
    }

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));
    lbPrev.addEventListener('click', e => { e.stopPropagation(); goTo(current - 1); });
    lbNext.addEventListener('click', e => { e.stopPropagation(); goTo(current + 1); });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') goTo(current + 1);
      if (e.key === 'ArrowLeft') goTo(current - 1);
      if (lightbox.classList.contains('open')) {
        if (e.key === '+' || e.key === '=') zoomIn();
        if (e.key === '-') zoomOut();
      }
    });

    // Lightbox
    let scale = 1, panX = 0, panY = 0;
    let dragging = false, startX, startY, startPanX, startPanY;

    function openLightbox() {
      lbImg.src = slides[current];
      resetZoom();
      lightbox.classList.add('open');
      updateUI();
    }
    function closeLightbox() { lightbox.classList.remove('open'); }
    function applyTransform() {
      lbImg.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      zoomLevelEl.textContent = Math.round(scale * 100) + '%';
    }
    function resetZoom() { scale = 1; panX = 0; panY = 0; applyTransform(); }
    function zoomIn() { scale = Math.min(scale * 1.25, 5); applyTransform(); }
    function zoomOut() { scale = Math.max(scale / 1.25, 0.5); if (scale <= 1) { panX = 0; panY = 0; } applyTransform(); }

    zoomBtn.addEventListener('click', openLightbox);
    img.addEventListener('dblclick', openLightbox);
    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    lbZoomIn.addEventListener('click', e => { e.stopPropagation(); zoomIn(); });
    lbZoomOut.addEventListener('click', e => { e.stopPropagation(); zoomOut(); });
    lbReset.addEventListener('click', e => { e.stopPropagation(); resetZoom(); });

    lbImg.addEventListener('wheel', e => {
      e.preventDefault();
      if (e.deltaY < 0) zoomIn(); else zoomOut();
    }, { passive: false });

    lbImg.addEventListener('mousedown', e => {
      if (scale <= 1) return;
      dragging = true;
      startX = e.clientX; startY = e.clientY;
      startPanX = panX; startPanY = panY;
      lbImg.classList.add('grabbing');
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      panX = startPanX + (e.clientX - startX);
      panY = startPanY + (e.clientY - startY);
      applyTransform();
    });
    document.addEventListener('mouseup', () => { dragging = false; lbImg.classList.remove('grabbing'); });

    // Touch
    let lastTouchDist = null;
    lbImg.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      } else if (e.touches.length === 1 && scale > 1) {
        dragging = true;
        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        startPanX = panX; startPanY = panY;
      }
    }, { passive: true });
    lbImg.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && lastTouchDist) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        scale = Math.min(Math.max(scale * (dist / lastTouchDist), 0.5), 5);
        lastTouchDist = dist;
        applyTransform();
      } else if (e.touches.length === 1 && dragging) {
        panX = startPanX + (e.touches[0].clientX - startX);
        panY = startPanY + (e.touches[0].clientY - startY);
        applyTransform();
      }
    }, { passive: true });
    lbImg.addEventListener('touchend', () => { lastTouchDist = null; dragging = false; });

    goTo(0);
    preload(1);
  </script>
</body>
</html>
